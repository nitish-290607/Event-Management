<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Management System - Home</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">Event Management</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto" id="navLinks">
                    <!-- Links injected by JS depending on Auth state -->
                </ul>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <header class="hero-section text-center text-white py-5 mb-5">
        <div class="container">
            <h1 class="display-4 fw-bold">Discover & Book Amazing Events</h1>
            <p class="lead">Your one-stop solution for managing and registering to events globally.</p>
            <div class="d-flex justify-content-center mt-4">
                <input type="text" id="searchInput" class="form-control w-50" placeholder="Search for events by title or venue...">
                <button class="btn btn-primary ms-2" onclick="loadEvents()">Search</button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container">
        <h2 class="mb-4">Upcoming Events</h2>
        <div class="row" id="eventsContainer">
            <!-- Events will be populated here via JavaScript -->
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center py-4 mt-5">
        <p>&copy; 2026 Event Management System. All Rights Reserved.</p>
    </footer>

    <!-- Bootstrap & Custom JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initNavigation();
            loadEvents();
        });
    </script>
</body>
</html>
