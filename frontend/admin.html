<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - EMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">Event Management</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto" id="navLinks"></ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h2>Admin Dashboard</h2>
        <hr>
        
        <!-- Analytics -->
        <div class="row mb-4" id="analyticsBoard">
            <div class="col-md-4">
                <div class="card text-white bg-success mb-3">
                    <div class="card-body">
                        <h5 class="card-title">Total Revenue</h5>
                        <h3 id="statRevenue">$0.00</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card text-white bg-info mb-3">
                    <div class="card-body">
                        <h5 class="card-title">Active Events</h5>
                        <h3 id="statEvents">0</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card text-white bg-primary mb-3">
                    <div class="card-body">
                        <h5 class="card-title">Total Users</h5>
                        <h3 id="statUsers">0</h3>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <!-- Create Venue Form -->
            <div class="col-md-4">
                <div class="card mb-4">
                    <div class="card-header bg-secondary text-white">Create Venue</div>
                    <div class="card-body">
                        <form id="createVenueForm">
                            <div class="mb-2">
                                <label>Name</label>
                                <input type="text" id="vName" class="form-control" required>
                            </div>
                            <div class="mb-2">
                                <label>Location</label>
                                <input type="text" id="vLocation" class="form-control" required>
                            </div>
                            <div class="mb-2">
                                <label>Capacity</label>
                                <input type="number" id="vCapacity" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-secondary w-100 mt-2">Save Venue</button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Create Event Form -->
            <div class="col-md-8">
                <div class="card mb-4">
                    <div class="card-header bg-primary text-white">Create New Event</div>
                    <div class="card-body">
                        <form id="createEventForm">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label>Title</label>
                                    <input type="text" id="eTitle" class="form-control" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label>Date & Time</label>
                                    <div class="input-group">
                                        <input type="date" id="eDate" class="form-control" required>
                                        <input type="time" id="eTime" class="form-control" required>
                                    </div>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label>Venue Selection</label>
                                    <select id="eVenue" class="form-select" required>
                                        <option value="">Select a Venue (Create one first)</option>
                                    </select>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label>Capacity</label>
                                    <input type="number" id="eCapacity" class="form-control" required>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label>Ticket Price ($)</label>
                                    <input type="number" step="0.01" id="ePrice" class="form-control" required>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Create Event</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- Event Management Table -->
        <h3 class="mt-4">Manage Events</h3>
        <table class="table table-striped mt-2">
            <thead class="table-dark">
                <tr>
                    <th>Title</th>
                    <th>Date</th>
                    <th>Price</th>
                    <th>Capacity</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="eventsTableBody">
                <!-- Javascript populated -->
            </tbody>
        </table>
    </div>

    <!-- Modals injected dynamically -->
    <div class="modal fade" id="attendeesModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Registered Attendees</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="attendeesList">Loading...</div>
            </div>
        </div>
    </div>

    <!-- Bootstrap & Custom JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initNavigation();
            if(localStorage.getItem('role') !== 'Admin') {
                window.location.href = "index.html";
                return;
            }
            loadAdminData();
        });
        
        async function loadAdminData() {
            loadVenues();
            loadAnalytics();
            loadAdminEventsTable();
        }

        async function loadAnalytics() {
            try {
                const res = await fetch(`${API_BASE_URL}/events/analytics`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                const data = await res.json();
                document.getElementById('statRevenue').innerText = `$${parseFloat(data.total_revenue).toFixed(2)}`;
                document.getElementById('statEvents').innerText = data.total_events;
                document.getElementById('statUsers').innerText = data.total_users;
            } catch (error) { console.error(error); }
        }

        async function loadVenues() {
            try {
                const res = await fetch(`${API_BASE_URL}/events/venues`);
                const venues = await res.json();
                const select = document.getElementById('eVenue');
                select.innerHTML = '<option value="">Select a Venue...</option>';
                venues.forEach(v => {
                    select.innerHTML += `<option value="${v.id}">${v.name} (${v.location})</option>`;
                });
            } catch (error) { console.error("Failed to load venues"); }
        }

        async function loadAdminEventsTable() {
            try {
                const res = await fetch(`${API_BASE_URL}/events/`);
                const events = await res.json();
                const tbody = document.getElementById('eventsTableBody');
                tbody.innerHTML = '';
                events.forEach(ev => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${ev.title}</td>
                            <td>${ev.event_date}</td>
                            <td>$${ev.ticket_price.toFixed(2)}</td>
                            <td>${ev.current_attendees} / ${ev.capacity}</td>
                            <td>
                                <button class="btn btn-sm btn-info" onclick="viewAttendees(${ev.id})">Attendees</button>
                                <button class="btn btn-sm btn-danger" onclick="deleteEvent(${ev.id})">Delete</button>
                            </td>
                        </tr>
                    `;
                });
            } catch(error) { console.error("Failed to load events table"); }
        }

        async function viewAttendees(eventId) {
            const modal = new bootstrap.Modal(document.getElementById('attendeesModal'));
            modal.show();
            const list = document.getElementById('attendeesList');
            list.innerHTML = 'Loading...';
            try {
                const res = await fetch(`${API_BASE_URL}/events/${eventId}/registrations`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                const users = await res.json();
                if(users.length === 0) {
                    list.innerHTML = '<p>No attendees yet.</p>';
                    return;
                }
                let html = '<ul class="list-group">';
                users.forEach(u => html += `<li class="list-group-item">${u.username} (${u.email})</li>`);
                html += '</ul>';
                list.innerHTML = html;
            } catch (error) {
                list.innerHTML = '<p class="text-danger">Failed to load attendees.</p>';
            }
        }

        async function deleteEvent(eventId) {
            if(!confirm("Are you sure you want to delete this event globally?")) return;
            try {
                await fetch(`${API_BASE_URL}/events/${eventId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                loadAdminData(); // refresh table & stats
            } catch(e) { alert("Failed to delete"); }
        }

        document.getElementById('createVenueForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const url = `${API_BASE_URL}/events/venues?name=${encodeURIComponent(document.getElementById('vName').value)}&location=${encodeURIComponent(document.getElementById('vLocation').value)}&capacity=${document.getElementById('vCapacity').value}`;
            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                if(res.ok) {
                    e.target.reset();
                    loadVenues();
                } else alert("Error creating venue");
            } catch (error) { alert("Request Failed"); }
        });

        document.getElementById('createEventForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const body = {
                title: document.getElementById('eTitle').value,
                description: "...",
                event_date: document.getElementById('eDate').value,
                event_time: document.getElementById('eTime').value + ":00",
                venue_id: document.getElementById('eVenue').value,
                capacity: document.getElementById('eCapacity').value,
                ticket_price: document.getElementById('ePrice').value,
                status: "upcoming"
            };
            try {
                const res = await fetch(`${API_BASE_URL}/events/`, {
                    method: 'POST',
                    headers: { 
                        'Authorization': `Bearer ${localStorage.getItem('token')}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(body)
                });
                if(res.ok) {
                    e.target.reset();
                    loadAdminData();
                } else alert("Error creating event");
            } catch (error) { alert("Request Failed"); }
        });
    </script>
</body>
</html>
